<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bea Dev</title>
    <link rel="stylesheet" href="../css/style.css" />
    <script src="../js/nav.js"></script>
    <link
      rel="shortcut icon"
      href="../assets/logo-portfolio.ico"
      type="image/x-icon"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
  </head>
  <style>
    .material-symbols-outlined {
      font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 20;
    }
  </style>
  <body>
    <header>
      <section class="logo">
        <a href="#"
          ><img src="../assets/logo-portfolio.ico" alt="Logo Portfolio"
        /></a>
      </section>
      <section class="section-box">
        <div class="search">
          <p>Portfolio</p>
        </div>
      </section>
      <section class="options-center">
        <span class="material-symbols-outlined">minimize </span>
        <div class="options">
          <span class="material-symbols-outlined">
            check_box_outline_blank </span
          ><span class="material-symbols-outlined"> close </span>
        </div>
      </section>
    </header>
    <main>
      <section class="vertical-nav">
        <ul>
          <a href="#"><li  onclick="openNav()">
            <span class="material-symbols-outlined pointer">
              file_copy
            </span>
          </li></a>
          <a href="#"><li>
            <span class="material-symbols-outlined pointer" onclick="openNav()">
              search
            </span>
          </li></a>
          <li>
            <a href="#"><span class="material-symbols-outlined pointer" onclick="openNav()">
              stacks
            </span>
          </li></a>
          <a href="#"><li>
            <img class="icons" src="../assets/git-fork.png" alt="Git fork" />
          </li></a>
          <a href="#"><li><span class="material-symbols-outlined"> open_in_new </span></li></a>
        </ul>
        <ul>
          <li>
            <span class="material-symbols-outlined"> account_circle </span>
          </li>
          <li><span class="material-symbols-outlined"> settings </span></li>
        </ul>
      </section>
      <section id="mySidenav" class="sidenav">
        <a href="javascript:void(0)" class="closebtn" onclick="closeNav()"
          >&times;</a
        >
        <p>coisas que aparecerão baseadas no item que for clicado pq JS</p>
      </section>
      <section id="main">
        <h2>Sessão que vai ser empurrada pro lado</h2>
        <p>Isso tem que ser empurrado pra direita sem estragar nada</p>
      </section>
    </main>
    <footer></footer>
  </body>
</html>
