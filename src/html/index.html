<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bea Dev</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link
      rel="shortcut icon"
      href="../assets/logo-portfolio.ico"
      type="image/x-icon"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
  </head>
  <style>
    .material-symbols-outlined {
      font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 20;
    }
  </style>
  <body>
    <header>
      <section class="logo">
        <a href="#"
          ><img src="../assets/logo-portfolio.ico" alt="Logo Portfolio"
        /></a>
      </section>
      <section class="section-box">
        <div class="search">
          <p>Portfolio</p>
        </div>
      </section>
      <section class="options-center">
        <span class="material-symbols-outlined">minimize </span>
        <div class="options">
          <span class="material-symbols-outlined">
            check_box_outline_blank </span
          ><span class="material-symbols-outlined"> close </span>
        </div>
      </section>
    </header>
    <main>
      <nav class="vertical-nav">
        <ul>
          <li><span class="material-symbols-outlined"> file_copy </span></li>
          <li><span class="material-symbols-outlined"> search </span></li>
          <li><span class="material-symbols-outlined"> stacks </span></li>
          <li>
            <img class="icons" src="../assets/git-fork.png" alt="Git fork" />
          </li>
          <li><span class="material-symbols-outlined"> open_in_new </span></li>
        </ul>
        <ul>
          <li>
            <span class="material-symbols-outlined"> account_circle </span>
          </li>
          <li><span class="material-symbols-outlined"> settings </span></li>
        </ul>
      </nav>
    </main>
    <footer></footer>
  </body>
</html>
